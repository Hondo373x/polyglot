
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyglot - 3 Cup Language Engine</title>
    <style>
        :root {
            --primary: #1a73e8;
            --success: #34a853;
            --bg: #f8f9fa;
            --text: #202124;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Persistent Word Intro Area */
        #persistent-intro {
            width: 100%;
            max-width: 600px;
            background: #fff;
            border-bottom: 2px solid #e0e0e0;
            padding: 15px;
            text-align: center;
            box-sizing: border-box;
            display: none;
        }
        .app-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }
        .view-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            text-align: center;
        }
        .hotspot-container {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            display: none;
        }
        .hotspot-container img {
            width: 100%;
            display: block;
        }
        .ring-pulse {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.8; }
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }
        .btn-repeat { background: #5f6368; }
        .highlight-caps { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <!-- Persistent Header for Cup 3 / New Word Intro -->
    <div id="persistent-intro">
        <h3 style="margin:0 0 5px 0;">New Word Tracker</h3>
        <div id="intro-word-details" style="font-size:18px;"></div>
        <button class="btn" style="padding:5px 10px; font-size:12px;" onclick="speakIntro()">🔊 Listen</button>
    </div>

    <div class="app-container">
        <!-- View 1: Three Cup Drilling View -->
        <div id="drill-view" class="view-card">
            <h2 id="display-english" style="color:#5f6368;"></h2>
            <h1 id="display-target" style="font-size:36px; margin: 10px 0;"></h1>
            <h3 id="display-phonetic" style="color: #1a73e8; font-style: italic;"></h3>
            <div id="status-bubble" style="margin:20px 0; font-weight:bold;"></div>
            <button id="action-btn" class="btn" onclick="handleDrillAction()">Start Drill</button>
        </div>

        <!-- View 2: Interactive POV Hotspot View -->
        <div id="hotspot-view" class="hotspot-container">
            <img id="pov-image" src="" alt="POV Situation">
            <!-- Pulsing rings are dynamically injected here via JS -->
        </div>

        <!-- System Controls Switcher -->
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn btn-repeat" onclick="switchMethod('drill')">3-Cup Drill</button>
            <button class="btn btn-repeat" onclick="switchMethod('hotspot')">POV Hotspots</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
