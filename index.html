
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Polyglot Training Loop</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white p-6">
    <div id="trainer" class="max-w-lg mx-auto bg-gray-800 p-8 rounded-xl text-center">
        <!-- Persistent Display -->
        <h2 id="eng-text" class="text-gray-400 italic text-xl mb-2">I am going home</h2>
        <h1 id="tl-text" class="text-4xl font-black text-white mb-2">Pupunta ako sa bahay</h1>
        <p id="pho-text" class="text-amber-500 font-mono text-lg mb-8">Poo-poon-tah ah-koh sah bah-high</p>

        <!-- Status and Feedback -->
        <div id="status" class="text-blue-400 font-bold mb-4">Repetition 1 of 3</div>
        <button id="btn" onclick="startLoop()" class="w-full py-6 bg-green-600 rounded-lg font-bold text-xl">Start Training</button>
    </div>

    <script>
        let rep = 1;
        const phrase = "pupunta ako sa bahay";
        
        async function startLoop() {
            if (rep > 3) return;
            
            document.getElementById('status').innerText = "Repetition " + rep + " of 3: Listening...";
            
            // 1. Browser speaks the phrase
            const msg = new SpeechSynthesisUtterance(phrase);
            msg.lang = 'tl-PH';
            window.speechSynthesis.speak(msg);
            
            // 2. Wait for audio to finish, then listen
            msg.onend = () => {
                const recog = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recog.lang = 'tl-PH';
                recog.start();
                recog.onresult = (e) => {
                    let heard = e.results[0][0].transcript.toLowerCase();
                    if (heard.includes("pupunta") || heard.includes("bahay")) {
                        rep++;
                        if(rep <= 3) {
                            document.getElementById('status').innerText = "Correct! Get ready for Rep " + rep;
                            setTimeout(startLoop, 2000);
                        } else {
                            document.getElementById('status').innerText = "Complete! Great job.";
                            document.getElementById('btn').innerText = "Restart";
                            document.getElementById('btn').onclick = () => location.reload();
                        }
                    } else {
                        document.getElementById('status').innerText = "Try again. You said: " + heard;
                    }
                };
            };
        }
    </script>
</body>
</html>
