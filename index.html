<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Three Cup Method</title>
    <style>
        body { background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; gap: 20px; }
        .cup { width: 100px; height: 100px; border: 2px solid #555; display: flex; justify-content: center; align-items: center; border-radius: 10px; cursor: pointer; }
        .cup:hover { border-color: #00ff00; }
    </style>
</head>
<body>
    <div class="cup" onclick="cupClicked(1)">Cup 1</div>
    <div class="cup" onclick="cupClicked(2)">Cup 2</div>
    <div class="cup" onclick="cupClicked(3)">Cup 3</div>

    <script>
        function cupClicked(n) {
            alert("You successfully selected Cup " + n);
        }
    </script>
</body>
</html>
