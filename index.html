<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Polyglot Structure Trainer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white p-6">

    <div class="max-w-md mx-auto text-center mb-8">
        <h2 class="text-xl font-bold mb-4">Training Structure</h2>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="loadLevel(0)" class="p-4 bg-blue-800 rounded-lg font-bold">Structure 1: Intro</button>
            <button onclick="loadLevel(1)" class="p-4 bg-blue-800 rounded-lg font-bold">Structure 2: Full Phrase</button>
        </div>
    </div>

    <div id="trainer" class="hidden max-w-lg mx-auto bg-gray-800 p-6 rounded-xl text-center">
        <p id="eng-display" class="text-gray-400 italic mb-2"></p>
        <p id="tl-display" class="text-3xl font-black mb-1"></p>
        <p id="pho-display" class="text-amber-500 font-mono text-sm mb-6"></p>
        
        <button id="listen-btn" onclick="startRecognition()" class="w-full py-4 bg-green-600 rounded-lg font-bold mb-4">🎙️ Speak Phrase</button>
        <div id="rep-counter" class="text-sm font-bold text-green-400">Reps: 0/3</div>
    </div>

    <script>
        const STRUCTURES = [
            { eng: "Going", tl: "Pupunta", pho: "Poo-poon-tah" },
            { eng: "I am going home", tl: "Pupunta ako sa bahay", pho: "Poo-poon-tah ah-koh sah bah-high" }
        ];
        let currentIdx = 0;
        let reps = 0;

        function loadLevel(idx) {
            currentIdx = idx;
            reps = 0;
            document.getElementById('trainer').classList.remove('hidden');
            updateUI();
        }

        function updateUI() {
            document.getElementById('eng-display').innerText = STRUCTURES[currentIdx].eng;
            document.getElementById('tl-display').innerText = STRUCTURES[currentIdx].tl;
            document.getElementById('pho-display').innerText = STRUCTURES[currentIdx].pho;
            document.getElementById('rep-counter').innerText = "Reps: " + reps + "/3";
        }

        const recog = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recog.lang = 'tl-PH';

        function startRecognition() {
            recog.start();
        }

        recog.onresult = (e) => {
            let heard = e.results[0][0].transcript.toLowerCase();
            let target = STRUCTURES[currentIdx].tl.toLowerCase();
            if (heard.includes(target) || target.includes(heard)) {
                reps++;
                updateUI();
                if(reps >= 3) alert("Goal Met!");
            } else {
                alert("Try again. You said: " + heard);
            }
        };
    </script>
</body>
</html>
