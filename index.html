<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyglot System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col justify-between">

    <!-- TOP BAR -->
    <header class="bg-gray-800 p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-black tracking-wider text-green-400">POLYGLOT ENGINE</h1>
        <div id="counter-badge" class="bg-green-900 text-green-300 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest border border-green-600 shadow-inner">
            System Ready
        </div>
    </header>

    <!-- MAIN INTERACTIVE MONITOR -->
    <main class="flex-grow flex flex-col justify-center items-center p-4">
        
        <!-- ONBOARDING PACKAGE SELECTION SCREEN -->
        <div id="onboarding-screen" class="w-full max-w-md bg-gray-800 border-2 border-gray-700 p-6 rounded-2xl shadow-2xl text-center space-y-6">
            <h2 class="text-2xl font-bold tracking-tight text-white">Select Language Track</h2>
            <p class="text-sm text-gray-400">Initialize your learning engine module below.</p>
            <div class="space-y-4 pt-2">
                <button onclick="selectPackage('ministry')" class="w-full py-4 bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 text-white font-extrabold text-lg rounded-xl transition duration-200 transform active:scale-95 shadow-md uppercase tracking-wider">
                    Ministry & Faith
                </button>
                <button class="w-full py-4 bg-gray-700 text-gray-400 font-bold text-lg rounded-xl cursor-not-allowed opacity-50 uppercase tracking-wider" disabled>
                    Business Track (Locked)
                </button>
            </div>
        </div>

        <!-- ACTIVE LESSON SCREEN (HIDDEN BY DEFAULT) -->
        <div id="lesson-screen" class="w-full max-w-2xl bg-gray-800 border-2 border-gray-700 p-6 rounded-2xl shadow-2xl space-y-6 hidden">
            <!-- English Reference Prompt Frame -->
            <div class="bg-gray-950 p-5 rounded-xl border border-gray-700 shadow-inner text-center">
                <div class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">English Source Target</div>
                <p id="english-frame" class="text-xl font-semibold text-gray-200 italic leading-relaxed">Loading track source...</p>
            </div>

            <!-- Target Language Render Array Area -->
            <div class="space-y-3">
                <div class="text-xs font-bold text-gray-500 uppercase tracking-widest pl-1">Target Language Component Deck</div>
                <div id="word-columns-container" class="flex flex-wrap gap-3 justify-center items-center bg-gray-900 p-6 rounded-xl border border-gray-700 shadow-inner min-h-[140px]">
                    <!-- Dynamic JavaScript matrix population injects cards here -->
                </div>
            </div>
        </div>

    </main>

    <!-- FOOTER STATUS INDICATOR -->
    <footer class="bg-gray-950 p-3 text-center border-t border-gray-800">
        <p class="text-xs text-gray-600 font-mono tracking-widest uppercase">Polyglot Build V1.1.0 • Standalone Offline Mode Active</p>
    </footer>

    <!-- LINK EXTERNAL CODE CORE -->
    <script src="app.js"></script>
</body>
</html>
