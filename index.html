
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Polyglot V2.1</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white p-6">
    <div id="onboarding" class="text-center p-10 bg-gray-800 rounded-xl">
        <button onclick="loadApp()" class="px-8 py-4 bg-green-600 rounded-lg font-bold">Load Training Elements</button>
    </div>

    <div id="app" class="hidden max-w-lg mx-auto bg-gray-800 p-6 rounded-xl space-y-4">
        <h2 id="verse-title" class="text-xl font-bold text-green-400"></h2>
        <p id="eng-text" class="text-sm italic text-gray-400"></p>
        <p id="tl-text" class="text-2xl font-black"></p>
        <p id="pho-text" class="text-xs text-amber-500 font-mono"></p>
        
        <button id="speak-btn" onclick="runAudio()" class="w-full py-4 bg-green-700 rounded-lg font-bold">🔊 Speak Phrase</button>
        <div class="grid grid-cols-2 gap-2">
            <button onclick="resetReps()" class="py-2 bg-red-900 rounded-lg">Reset</button>
            <button onclick="nextStep()" class="py-2 bg-blue-900 rounded-lg">Good</button>
        </div>
    </div>

    <script>
        const DECK = [
            { v: "Proverbs 3:5 (Part A)", eng: "Trust in the Lord...", tl: "Magtiwala ka sa Panginoon nang buong puso mo", pho: "Mag-ti-wala ka sa Pa-ngi-no-on nang bu-ong pu-so mo" },
            { v: "Proverbs 3:5 (Part B)", eng: "Lean not on your own understanding", tl: "huwag kang manalig sa iyong sariling pagkaunawa", pho: "hoo-wag kahng mah-nah-lig sa ee-yong sah-ri-ling pahg-kah-oo-nah-wah" }
        ];
        let idx = 0;
        function loadApp() { document.getElementById('onboarding').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); updateUI(); }
        function updateUI() { 
            document.getElementById('verse-title').innerText = DECK[idx].v;
            document.getElementById('eng-text').innerText = DECK[idx].eng;
            document.getElementById('tl-text').innerText = DECK[idx].tl;
            document.getElementById('pho-text').innerText = DECK[idx].pho;
        }
        function runAudio() { 
            const msg = new SpeechSynthesisUtterance(DECK[idx].tl);
            msg.lang = 'tl-PH';
            window.speechSynthesis.speak(msg);
        }
        function nextStep() { idx = (idx + 1) % DECK.length; updateUI(); }
        function resetReps() { updateUI(); }
    </script>
</body>
</html>
